<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LabAssist AI — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0f14;
      --card: #161921;
      --border: rgba(255,255,255,0.07);
      --accent: #3b82f6;
      --accent-glow: rgba(59,130,246,0.3);
      --text: #e8eaf0;
      --muted: #8892a4;
      --input-bg: #1c1f28;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Gradient orbs */
    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
      top: -100px; right: -100px;
      pointer-events: none;
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      position: relative;
      z-index: 1;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
    }

    .logo-section {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--accent), #6366f1, #8b5cf6);
      border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 24px;
      margin-bottom: 16px;
      box-shadow: 0 0 32px var(--accent-glow);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
    }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: 'IBM Plex Sans', sans-serif;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus {
      border-color: rgba(59,130,246,0.5);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .btn-login {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 9px;
      padding: 11px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
      font-family: 'IBM Plex Sans', sans-serif;
    }
    .btn-login:hover  { background: #2563eb; box-shadow: 0 0 20px var(--accent-glow); }
    .btn-login:active { transform: scale(0.98); }

    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      color: var(--danger);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .footer-text {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    .feature-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .feature-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12.5px;
      color: var(--muted);
    }
    .feature-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-section">
      <div class="logo-icon">⚗️</div>
      <h1>LabAssist AI</h1>
      <div class="subtitle">LIMS Intelligence Platform</div>
    </div>

    {% if error %}
    <div class="error-msg">
      ⚠️ {{ error }}
    </div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter your username" required autofocus />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required />
      </div>
      <button type="submit" class="btn-login">Sign In to LabAssist AI</button>
    </form>

    <div class="divider"></div>

    <div class="feature-list">
      <div class="feature-item"><div class="feature-dot"></div>SOP & procedure knowledge base</div>
      <div class="feature-item"><div class="feature-dot"></div>Live LIMS database queries</div>
      <div class="feature-item"><div class="feature-dot"></div>Powered by local Ollama LLMs</div>
    </div>

    <div class="footer-text">v1.0 · SampleManager LIMS Integration</div>
  </div>
</body>
</html>
